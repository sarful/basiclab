sition:transform 450ms ease"><g></g><g></g><g></g></g><g transform="translate(0 0)"><rect x="305" y="850" width="680" height="120" rx="16" fill="#fafafa" stroke="#b6c0cc" stroke-width="2"></rect><text x="645" y="885" text-anchor="middle" font-size="22" font-weight="900" fill="#1e40af">HOW IT WORKS</text><text x="332" y="915" font-size="18" font-weight="700" fill="#111">When the coil (A1-A2) is</text><text x="522" y="915" font-size="18" font-weight="900" fill="#0f8a27">energized</text><text x="625" y="915" font-size="18" font-weight="700" fill="#111">, it generates a magnetic field that pulls the</text><text x="332" y="945" font-size="18" font-weight="700" fill="#111">armature up. This</text><text x="476" y="945" font-size="18" font-weight="900" fill="#0f8a27">closes</text><text x="552" y="945" font-size="18" font-weight="700" fill="#111">the main contacts, closes the</text><text x="790" y="945" font-size="18" font-weight="900" fill="#0f8a27">NO</text><text x="822" y="945" font-size="18" font-weight="700" fill="#111">contact and</text><text x="919" y="945" font-size="18" font-weight="900" fill="#e21a1a">opens</text><text x="332" y="972" font-size="18" font-weight="700" fill="#111">the</text><text x="370" y="972" font-size="18" font-weight="900" fill="#e21a1a">NC</text><text x="402" y="972" font-size="18" font-weight="700" fill="#111">contact. Current then flows from the</text><text x="696" y="972" font-size="18" font-weight="900" fill="#1746a2">supply</text><text x="762" y="972" font-size="18" font-weight="700" fill="#111">to the</text><text x="829" y="972" font-size="18" font-weight="900" fill="#1746a2">load</text><text x="868" y="972" font-size="18" font-weight="700" fill="#111">.</text></g><g transform="translate(1135 742)"><rect width="215" height="210" rx="16" fill="#fafafa" stroke="#b6c0cc" stroke-width="2"></rect><text x="108" y="30" text-anchor="middle" font-size="18" font-weight="900" fill="#1e40af">LEGEND</text><line x1="22" y1="60" x2="76" y2="60" stroke="#e21a1a" stroke-width="5" stroke-linecap="round"></line><text x="88" y="66" font-size="16" font-weight="900" fill="#e21a1a">L1</text><text x="113" y="66" font-size="16" font-weight="700" fill="#111">(PHASE 1)</text><line x1="22" y1="92" x2="76" y2="92" stroke="#f4b400" stroke-width="5" stroke-linecap="round"></line><text x="88" y="98" font-size="16" font-weight="900" fill="#f4b400">L2</text><text x="113" y="98" font-size="16" font-weight="700" fill="#111">(PHASE 2)</text><line x1="22" y1="124" x2="76" y2="124" stroke="#1746a2" stroke-width="5" stroke-linecap="round"></line><text x="88" y="130" font-size="16" font-weight="900" fill="#1746a2">L3</text><text x="113" y="130" font-size="16" font-weight="700" fill="#111">(PHASE 3)</text><line x1="22" y1="156" x2="76" y2="156" stroke="#111" stroke-width="4" stroke-linecap="round"></line><text x="88" y="162" font-size="16" font-weight="700" fill="#111">CONTROL WIRING</text><circle cx="49" cy="186" r="8" fill="url(#copper)" stroke="#5d3420" stroke-width="2"></circle><text x="88" y="192" font-size="16" font-weight="700" fill="#111">CONTACT POINT</text></g></svg>